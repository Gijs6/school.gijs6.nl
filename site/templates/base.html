<!DOCTYPE html>
<html lang="nl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>{%- block title -%}Samenvattingen :){%- endblock %} - school.gijs6.nl</title>
        <meta name="description"
              content="{%- block meta_description -%}Samenvattingen voor school{%- endblock -%}">
        <meta name="author" content="Gijs ten Berg">

        <link rel="canonical"
              href="https://school.gijs6.nl{%- block canonical_path -%}/{%- endblock -%}">

        <meta property="og:site_name" content="school.gijs6.nl">
        <meta property="og:type"
              content="{%- block og_type -%}website{%- endblock -%}">
        <meta property="og:url"
              content="https://school.gijs6.nl{%- block og_url -%}/{%- endblock -%}">
        <meta property="og:title"
              content="{%- block og_title -%}Samenvattingen - school.gijs6.nl{%- endblock -%}">
        <meta property="og:description"
              content="{%- block og_description -%}Samenvattingen voor school{%- endblock -%}">
        <meta property="og:locale" content="nl_NL">

        <link rel="icon" href="/assets/images/favicon.ico">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="stylesheet"
              href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap">

        <link rel="stylesheet" href="/assets/styles/main.css">
        {% block extra_head %}{% endblock %}

        <link rel="me" href="https://gijs6.nl">
        <link rel="me" href="https://github.com/Gijs6">

        <link rel="license" href="https://creativecommons.org/public-domain/cc0/">

        <link rel="alternate"
              type="application/rss+xml"
              title="RSS feed"
              href="/rss.xml">
        <link rel="alternate"
              type="application/atom+xml"
              title="Atom feed"
              href="/atom.xml">

        <script src="https://kit.fontawesome.com/4a94c21782.js"
                crossorigin="anonymous"
                defer></script>
    </head>
    <body>
        <main class="page__main">
            {% block content %}{% endblock %}
        </main>

        <footer class="page__footer">
            <ul class="page__footer-list">
                <li class="page__footer-item">
                    <address class="page__footer-address">
                        <a class="page__footer-link"
                           href="https://gijs6.nl"
                           target="_blank"
                           rel="author noopener noreferrer">Door <span class="page__footer-author">Gijs ten Berg</span></a>
                    </address>
                </li>

                <li class="page__footer-item">
                    <a class="page__footer-link"
                       href="https://creativecommons.org/public-domain/cc0/"
                       target="_blank"
                       rel="license noopener noreferrer">CC0</a>
                </li>

                <li class="page__footer-item">
                    <a class="page__footer-link"
                       href="https://gijs6.nl/contact"
                       target="_blank"
                       rel="noopener noreferrer">Contact</a>
                </li>

                <li class="page__footer-item">
                    <a class="page__footer-link"
                       href="https://github.com/Gijs6/school.gijs6.nl"
                       target="_blank"
                       rel="noopener noreferrer">Repository</a>
                </li>
                <li class="page__footer-item">
                    <a class="page__footer-link"
                       href="https://github.com/Gijs6/school.gijs6.nl/blob/main/{{ page_path }}"
                       target="_blank"
                       rel="noopener noreferrer">Broncode</a>
                </li>
            </ul>
        </footer>
    </body>
</html>
